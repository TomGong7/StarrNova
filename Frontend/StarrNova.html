<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欢迎 - StarrNova 智能教育平台</title>
    <link rel="stylesheet" href="Styles.css">
    <link rel="stylesheet" href="StarrNova.css">
</head>

<body class="welcome-page">
    <div class="wrapper">
        <!-- 导航栏 -->
        <nav>
            <div class="container">
                <ul>
                    <li><a href="StarrNova.html" class="active">首页</a></li>
                    <li><a href="About/About.html">关于我们</a></li>
                </ul>
            </div>
        </nav>

        <!-- 主内容 -->
        <main>
            <!-- 欢迎区域 -->
            <section class="hero">
                <div class="container">
                    <div class="hero-content">
                        <h1>欢迎来到 StarrNova</h1>
                        <p class="hero-subtitle">一站式智能教育平台</p>
                        <p class="hero-description">为大学提供全面的教学管理解决方案</p>
                        <div class="hero-buttons">
                            <a href="Register/Register.html" class="btn btn-primary">注册账号</a>
                            <a href="#" class="btn btn-secondary">登录</a>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 功能介绍区域 -->
            <section class="features">
                <div class="container">
                    <h2>平台特色</h2>
                    <div class="features-grid">
                        <div class="feature-card">
                            <div class="feature-icon">📚</div>
                            <h3>课程管理</h3>
                            <p>完整的课程创建、管理和分配功能</p>
                        </div>
                        <div class="feature-card">
                            <div class="feature-icon">👥</div>
                            <h3>学生管理</h3>
                            <p>便捷的学生信息管理和学习进度跟踪</p>
                        </div>
                        <div class="feature-card">
                            <div class="feature-icon">📊</div>
                            <h3>数据分析</h3>
                            <p>详细的教学数据分析和报表生成</p>
                        </div>
                        <div class="feature-card">
                            <div class="feature-icon">🔐</div>
                            <h3>安全保障</h3>
                            <p>多层次的数据加密和访问控制</p>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 用户角色介绍 -->
            <section class="user-roles">
                <div class="container">
                    <h2>用户角色</h2>
                    <div class="roles-grid">
                        <div class="role-card">
                            <h3>学生</h3>
                            <p>查看课程、提交作业、查看成绩</p>
                        </div>
                        <div class="role-card">
                            <h3>教师</h3>
                            <p>创建课程、批改作业、发布成绩</p>
                        </div>
                        <div class="role-card">
                            <h3>管理员</h3>
                            <p>管理用户、维护系统、生成报表</p>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <!-- 页脚 -->
        <footer>
            <div class="container">
                <p>&copy; 2026 StarrNova. 保留所有权利。</p>
                <p>联系我们: info@starrnova.com</p>
